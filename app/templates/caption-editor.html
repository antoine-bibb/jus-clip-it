<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Caption Editor - Jus Clip It</title>
  <link rel="stylesheet" href="/static/styles.css" />
  <link rel="icon" type="image/png" href="/static/favicon.png">
  <link rel="shortcut icon" href="/static/favicon.png">
</head>
<body>

<header class="navbar">
  <div class="nav-inner">
    <div class="nav-left">
      <span class="app-title">Jus Clip It</span>
    </div>

    <div class="nav-center">
      <h2>Caption Editor</h2>
    </div>

    <div class="nav-right">
      <button id="backBtn" class="nav-btn">← Back to Clips</button>
    </div>
  </div>
</header>

<div class="editor-container">
  <div class="video-section">
    <video id="videoPlayer" controls></video>
    <div id="currentCaption" class="current-caption"></div>
  </div>

  <div class="timeline-section">
    <div class="timeline-controls">
      <button id="playPauseBtn">▶️ Play</button>
      <div class="time-display">
        <span id="currentTime">0:00</span> / <span id="duration">0:00</span>
      </div>
      <input type="range" id="timelineSlider" min="0" max="100" value="0" step="0.1">
    </div>

    <div class="words-timeline" id="wordsTimeline">
      <!-- Words will be rendered here -->
    </div>
  </div>

  <div class="edit-section">
    <div class="edit-controls">
      <button id="saveBtn" class="primary-btn">💾 Save Changes</button>
      <button id="resetBtn" class="secondary-btn">🔄 Reset</button>
    </div>

    <div class="selected-word-editor" id="wordEditor">
      <h3>Edit Word</h3>
      <div class="word-input-group">
        <label>Text:</label>
        <input type="text" id="wordText" placeholder="Enter word text">
      </div>
      <div class="time-input-group">
        <label>Start Time:</label>
        <input type="number" id="wordStart" step="0.001" placeholder="0.000">
      </div>
      <div class="time-input-group">
        <label>End Time:</label>
        <input type="number" id="wordEnd" step="0.001" placeholder="0.000">
      </div>
      <div class="editor-actions">
        <button id="updateWordBtn">Update</button>
        <button id="cancelEditBtn">Cancel</button>
      </div>
    </div>
  </div>
</div>

<script src="/static/caption-editor.js"></script>
</body>
</html></content>
